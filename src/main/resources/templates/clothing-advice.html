<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherForecast • Мои советы</title>
    <link rel="stylesheet" href="/css/clothing-advice.css">
</head>
<body>

<div class="bg"></div>
<div class="noise"></div>

<header class="header">
    <div class="container header-inner">
        <a href="/home" class="chip">
            <span class="chip-ico">🏠</span>
            <span>Главная</span>
        </a>

        <div class="brand">
            <div class="logo">WF</div>
            <div>
                <div class="brand-title">
                    WeatherForecast
                </div>
                <div class="brand-subtitle">Мои советы по одежде</div>
            </div>
        </div>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="chip danger">
                <span class="chip-ico">🚪</span>
                <span>Выйти</span>
            </button>
        </form>
    </div>
</header>

<main class="main">
    <div class="container">
        <section class="card">
            <h1 class="page-title">📝 Мои советы по одежде</h1>
            <p class="page-subtitle">
                Здесь сохраняются все ранее полученные советы.
            </p>

            <div class="advice-container">
                <ul class="advice-list">
                    <li class="advice-item" th:each="advice : ${adviceList}">
                        <div class="advice-date"
                             th:text="${#temporals.format(advice.createdAt, 'dd MMMM yyyy HH:mm')}">
                            01 января 2025 14:30
                        </div>

                        <p class="advice-text"
                           th:text="${advice.council}">
                            Здесь будет совет
                        </p>
                    </li>
                </ul>
            </div>

        </section>
    </div>
</main>

<footer class="footer">
    <div class="container footer-inner">
        <p>© 2025 Weather Forecast • Все права защищены</p>
        <p class="footer-muted">Made with ☁️ & ☀️</p>
    </div>
</footer>

</body>
</html>
