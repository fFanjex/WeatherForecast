<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WeatherForecast • Прогноз 5 дней</title>
    <link rel="stylesheet" href="/css/weather-forecast.css" />
</head>
<body>
<div class="bg"></div>
<div class="noise"></div>

<header class="header">
    <div class="container header-inner">
        <a href="/home" class="chip">
            <span class="chip-ico">⬅️</span>
            <span>На главную</span>
        </a>

        <div class="brand">
            <div class="logo" aria-hidden="true">WF</div>
            <div class="brand-text">
                <div class="brand-title" id="animated-title">
                    <span>W</span><span>e</span><span>a</span><span>t</span><span>h</span><span>e</span><span>r</span>
                    <span>F</span><span>o</span><span>r</span><span>e</span><span>c</span><span>a</span><span>s</span><span>t</span>
                </div>
                <div class="brand-subtitle">Прогноз на 5 дней</div>
            </div>
        </div>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="chip danger">
                <span class="chip-ico">🚪</span>
                <span>Выйти</span>
            </button>
        </form>
    </div>
</header>

<main class="main">
    <div class="container">
        <section class="card">
            <div class="card-head">
                <div class="badge">📅 Forecast</div>
                <div class="head-text">
                    <h1 class="page-title" th:text="'Прогноз на ' + ${currentDate} + ' в городе ' + ${city}"></h1>
                    <p class="page-subtitle">Листайте страницы, чтобы посмотреть следующие промежутки времени.</p>
                </div>
            </div>

            <div th:if="${forecastList}" class="table-wrap">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Дата и время</th>
                        <th>Температура</th>
                        <th>Описание</th>
                        <th>Ветер</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="forecast : ${forecastList}">
                        <td th:text="${forecast.dtTxt}"></td>
                        <td>
                            <span class="temp">
                                <span th:text="${forecast.main.temp}"></span><span class="unit">°C</span>
                            </span>
                        </td>
                        <td th:text="${forecast.weather[0].description}"></td>
                        <td>
                            <span th:text="${forecast.wind.speed}"></span><span class="unit"> м/с</span>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <nav class="pager">
                    <a class="page-btn"
                       th:classappend="${currentPage == 1} ? ' disabled'"
                       th:href="@{/weather/forecast(city=${city}, page=${currentPage - 1})}">
                        ⬅️ Назад
                    </a>
                    <div class="page-indicator">
                        <span class="dot"></span>
                        <span th:text="${currentPage}"></span>
                        <span class="sep">/</span>
                        <span th:text="${totalPages}"></span>
                    </div>
                    <a class="page-btn"
                       th:classappend="${currentPage == totalPages} ? ' disabled'"
                       th:href="@{/weather/forecast(city=${city}, page=${currentPage + 1})}">
                        Вперёд ➡️
                    </a>
                </nav>
            </div>

            <div th:if="${error}" class="alert">
                <div class="alert-title">Ошибка</div>
                <div class="alert-text" th:text="${error}"></div>
            </div>
        </section>
    </div>
</main>

<footer class="footer">
    <div class="container footer-inner">
        <p>© 2025 Weather Forecast • Все права защищены</p>
        <p class="footer-muted">Made with ☁️ &amp; ☀️</p>
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const spans = document.querySelectorAll('#animated-title span');
        spans.forEach((span, idx) => {
            span.style.opacity = '0';
            span.style.transition = 'opacity 0.4s ease';
            setTimeout(() => span.style.opacity = '1', idx * 70);
        });
    });
</script>
</body>
</html>
