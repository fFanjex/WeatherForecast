<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход • WeatherForecast</title>
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
<div class="bg"></div>
<div class="noise"></div>

<header class="header">
    <div class="brand">
        <div class="logo" aria-hidden="true">WF</div>
        <div class="brand-text">
            <div class="brand-title">WeatherForecast</div>
            <div class="brand-subtitle">С возвращением 👋</div>
        </div>
    </div>
</header>

<main class="main-content">
    <section class="card">
        <div class="card-head">
            <h1>Вход</h1>
            <p class="subtitle">Введите данные, чтобы продолжить.</p>
        </div>

        <form id="login-form" novalidate>
            <div class="field">
                <label for="email">Email</label>
                <div class="control">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            placeholder="Ваш email"
                            autocomplete="email"
                    />
                </div>
                <small class="hint">Введите email, указанный при регистрации</small>
            </div>

            <div class="field">
                <label for="password">Пароль</label>
                <div class="control">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M6 11h12v10H6V11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            minlength="6"
                            placeholder="Ваш пароль"
                            autocomplete="current-password"
                    />
                    <button class="ghost" type="button" id="togglePass" aria-label="Показать пароль">
                        Показать
                    </button>
                </div>
                <small class="hint">Минимум 6 символов</small>
            </div>

            <button class="primary" type="submit">
                <span>Войти</span>
                <span class="btn-glow" aria-hidden="true"></span>
            </button>

            <a href="/home" class="secondary-btn">Продолжить без аккаунта</a>

            <p class="auth-footer">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            </p>

            <p id="login-error" class="msg" role="status" aria-live="polite"></p>
        </form>
    </section>
</main>

<footer class="footer">
    <p>© 2026 Weather Forecast • Все права защищены</p>
</footer>

<script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('login-error');

    const togglePass = document.getElementById('togglePass');
    const passInput = document.getElementById('password');

    togglePass.addEventListener('click', () => {
        const isPassword = passInput.type === 'password';
        passInput.type = isPassword ? 'text' : 'password';
        togglePass.textContent = isPassword ? 'Скрыть' : 'Показать';
    });

    function validateInput(input) {
        if (!input.checkValidity()) {
            input.classList.add('error');
            return false;
        }
        input.classList.remove('error');
        return true;
    }

    form.addEventListener('input', (e) => {
        if (e.target.matches('input')) {
            validateInput(e.target);
        }
        msg.textContent = '';
        msg.className = 'msg';
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const inputs = Array.from(form.querySelectorAll('input'));
        let valid = true;

        inputs.forEach(input => {
            if (!validateInput(input)) {
                valid = false;
            }
        });

        if (!valid) {
            msg.className = 'msg error';
            msg.textContent = 'Пожалуйста, заполните все поля правильно.';
            return;
        }

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value
                })
            });

            if (!response.ok) {
                throw new Error('Неверный email или пароль');
            }

            const data = await response.json();

            localStorage.setItem('accessToken', data.accessToken);
            localStorage.setItem('refreshToken', data.refreshToken);

            window.location.href = '/home';
        } catch (err) {
            msg.className = 'msg error';
            msg.textContent = err.message || 'Ошибка входа';
        }
    });
</script>

</body>
</html>
